<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönlendiriliyorsunuz... - Rawlabs Beslenme Asistanı</title>
  <meta http-equiv="refresh" content="3;url=mama-onerisi.html">
  <link rel="canonical" href="https://rawlabs.com.tr/mama-onerisi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="img/favicon/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg);
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .redirect-card {
      background: var(--white);
      padding: 50px 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.5s ease-out;
    }
    .redirect-card .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="redirect-card">
    <div class="spinner"></div>
    <span class="emoji" style="font-size:2.5rem;display:block;margin-bottom:12px;">🧠</span>
    <h1 style="font-size:1.5rem;color:var(--secondary-dark);margin-bottom:12px;">Beslenme Asistanı'na Yönlendiriliyorsunuz</h1>
    <p style="color:var(--text-light);font-size:0.95rem;line-height:1.6;margin-bottom:28px;">
      "Ne Kadar Mama Yer?" porsiyon hesaplayıcımız ve "Mama Önerisi" aracımız tek bir çatı altında birleştirildi. Yeni Beslenme Asistanı sayfasına aktarılıyorsunuz...
    </p>
    <a href="mama-onerisi.html" class="btn btn-primary" style="width:100%;justify-content:center;">Hemen Geçiş Yap →</a>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = 'mama-onerisi.html';
    }, 3000);
  </script>
</body>
</html>
